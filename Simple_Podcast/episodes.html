<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Episodes — Gideon Speaks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-browse">

  <header class="site-header">
    <div class="container">
      <div class="header-content">
        <div class="brand">
          <span class="brand-icon">🎙️</span>
          <h1>Gideon Speaks</h1>
        </div>
        <nav class="header-nav">
          <a href="index.html">Home</a>
          <a href="episodes.html" class="active">Browse Episodes</a>
          <a href="#" class="rss-link">RSS Feed</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="browse-header animate-fade-in">
      <h2>Episode Library</h2>
      
      <div class="search-bar">
        <input type="text" id="episodeSearch" placeholder="Search episodes, tags, or series...">
        <span class="search-icon">🔍</span>
      </div>

      <div class="category-filters" id="categoryFilters">
        <button class="filter-btn active" data-category="all">All</button>
        <button class="filter-btn" data-category="Tech">Tech</button>
        <button class="filter-btn" data-category="Life">Life</button>
        <button class="filter-btn" data-category="Growth">Growth</button>
      </div>
    </section>

    <section id="episodes" class="episodes-grid">
      <!-- Full list rendered by JavaScript -->
    </section>
  </main>

  <footer class="player-bar" id="playerBar">
    <div class="container player-inner">
      <div class="now-playing">
        <div class="track-info">
          <div class="track-title" id="currentTrackTitle">Select an episode</div>
          <div class="track-subtitle" id="currentTrackCategory">-</div>
        </div>
      </div>

      <div class="player-controls">
        <div class="buttons">
          <button id="prevBtn" aria-label="Previous">⏮</button>
          <button id="playPauseBtn" class="play-btn" aria-label="Play">▶</button>
          <button id="nextBtn" aria-label="Next">⏭</button>
        </div>
        <div class="progress-container">
          <span id="currentTime">0:00</span>
          <input type="range" id="progressBar" value="0" min="0" max="100">
          <span id="durationTime">0:00</span>
        </div>
      </div>

      <div class="volume-control">
        <span>🔊</span>
        <input type="range" id="volumeBar" value="80" min="0" max="100">
      </div>
    </div>
  </footer>

  <template id="episodeTemplate">
    <article class="episode-card">
      <div class="episode-image">
        <img src="" alt="Thumbnail">
      </div>
      <div class="episode-content">
        <div class="episode-meta">
          <span class="tag"></span>
          <span class="date"></span>
        </div>
        <h3 class="episode-title"></h3>
        <p class="episode-desc"></p>
        <button class="btn-play-inline" data-action="play">Listen Now</button>
      </div>
    </article>
  </template>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-grid">
        <div>
          <p>© <span id="year"></span> Gideon Speaks.</p>
        </div>
        <div class="footer-links">
          <a href="#">Privacy</a>
          <a href="#">About</a>
          <a href="#">Contact</a>
        </div>
      </div>
    </div>
  </footer>

  <script src="main.js"></script>
</body>
</html>
